<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tailored CV Results</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; }
      .result { border: 1px solid #ddd; padding: 1rem; margin-bottom: 1rem; border-radius: 5px; }
      h2 { margin-top: 0; }
      a.button { display: inline-block; padding: 0.6rem 1rem; background: #2c7be5; color: white; text-decoration: none; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>Tailored CV Results</h1>
    <p>{{ tailored_results|length }} tailored file{{ '' if tailored_results|length == 1 else 's' }} generated.</p>

    {% for result in tailored_results %}
      <div class="result">
        <h2>{{ result.title }} at {{ result.company }}</h2>
        <p>Text file: <code>{{ result.text_path }}</code></p>
        <p><a class="button" href="/download/{{ result.pdf_name }}">Download PDF</a></p>
      </div>
    {% endfor %}

    <p><a href="/">Back to search</a></p>
  </body>
</html>
